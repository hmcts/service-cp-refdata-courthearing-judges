pool:
  name: "MDV-ADO-AGENT-AKS-01"
  demands:
    - identifier -equals ubuntu-j21

stages:
    - template: pipelines/vp-build.yaml@cppAzureDevOpsTemplates
      parameters:
        repo: "$(Build.Repository.Name)"

